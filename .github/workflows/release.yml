name: Release (build + tag)

# Manual release: click "Run workflow" on the Actions tab.
# Builds dist/, commits it, bumps the highest vN tag (v4 -> v5 ...), and pushes the tag.
# Nothing is released on normal pushes to main.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need full history + all tags to compute next version
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Build dist (ncc)
        run: npm run build

      - name: Commit dist (if changed)
        id: commit
        run: |
          git config user.email "stefan@raisl.net"
          git config user.name "Stefan Raisl"
          git add dist/
          if git diff --cached --quiet; then
            echo "dist unchanged"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "build: dist bundle for release"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        run: |
          # latest vN tag
          LATEST=$(git tag --list 'v[0-9]*' | sed 's/^v//' | grep -E '^[0-9]+$' | sort -n | tail -1)
          LATEST=${LATEST:-0}
          echo "latest = v${LATEST}"
          NEXT=$((LATEST + 1))
          echo "next = v${NEXT}"
          echo "version=v${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Push main + tag
        run: |
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push --atomic origin HEAD "${{ steps.version.outputs.version }}"
