name: Release (build + tag)

# Manual release: click "Run workflow" on the Actions tab.
# Builds dist/, then tags the CURRENT remote main with the next vN and pushes ONLY the tag
# (no main push — main is branch-protected, so we never commit dist to main here).
#
# If you want dist committed to main, open a PR; this workflow only produces a release tag.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (current main)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build dist (verify it matches committed)
        run: npm run build

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v[0-9]*' | sed 's/^v//' | grep -E '^[0-9]+$' | sort -n | tail -1)
          LATEST=${LATEST:-0}
          echo "latest = v${LATEST}"
          NEXT=$((LATEST + 1))
          echo "next = v${NEXT}"
          echo "version=v${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Tag current main + push tag only
        run: |
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          # push ONLY the tag, never main (branch protection blocks main pushes)
          git push origin "${{ steps.version.outputs.version }}"
