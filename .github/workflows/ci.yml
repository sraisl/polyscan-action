name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm audit --audit-level=moderate
      - name: Verify bundled entrypoint is up to date
        run: |
          npm run build
          # Runtime bundle files must match; source maps are not deterministic.
          if [ -n "$(git status --porcelain dist | grep -v '\.map$')" ]; then
            echo "::error::dist runtime files are out of date — run 'npm run build' and commit."
            git diff --stat dist
            exit 1
          fi
