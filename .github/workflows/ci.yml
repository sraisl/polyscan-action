name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - name: Verify bundled entrypoint is up to date
        run: |
          npm run build
          # Only the executable bundle must match; source maps are not deterministic.
          if [ -n "$(git status --porcelain dist/index.js)" ]; then
            echo "::error::dist/index.js is out of date — run 'npm run build' and commit."
            git diff --stat dist/index.js
            exit 1
          fi
