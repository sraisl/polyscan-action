name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm audit --audit-level=moderate
      - name: Verify bundled entrypoint is up to date
        run: |
          npm run build
          # Runtime bundle files must match; source maps are not deterministic.
          if [ -n "$(git status --porcelain dist | grep -v '\.map$')" ]; then
            echo "::warning::dist runtime files differ from source — run 'npm run build' and commit if this is unexpected."
            git diff --stat dist
          fi
